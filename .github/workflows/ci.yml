name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, dependency-light gate. No GTK/MeCab, so the GUI + furigana tests skip;
  # everything else (logic, grading, SRS, activity, dict, stats, translation,
  # CLI smoke) runs here for quick feedback.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pytest
      # Compiles every module without importing it (no GTK needed). Catches
      # syntax regressions incl. non-ASCII bytes in the GLASS_CSS b"""...""".
      - name: Syntax-check all modules
        run: python -m compileall -q bin tests
      - name: Run tests
        run: pytest -q

  # Full run with real GTK under a virtual display, measuring coverage across the
  # in-process tests AND the CLI/GUI subprocesses they spawn.
  coverage:
    runs-on: ubuntu-latest
    env:
      COVERAGE_PROCESS_START: ${{ github.workspace }}/.coveragerc
      GSETTINGS_BACKEND: memory
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 + libadwaita + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo gir1.2-gtk-4.0 gir1.2-adw-1 \
            libadwaita-1-0 gsettings-desktop-schemas xvfb
      - name: Create venv (system GTK) + test deps
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install --upgrade pip pytest coverage
      # Make coverage follow into the subprocesses the tests launch.
      - name: Enable subprocess coverage
        run: |
          site="$(.venv/bin/python -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          echo "import coverage; coverage.process_startup()" > "$site/zz_subprocess_coverage.pth"
      - name: Run tests under Xvfb with coverage
        run: |
          xvfb-run -a .venv/bin/coverage run --parallel-mode -m pytest -q
      - name: Combine + report coverage
        run: |
          .venv/bin/coverage combine
          .venv/bin/coverage report
