name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      # Compiles every module without importing it, so it needs no GTK/MeCab.
      # Catches syntax regressions — including non-ASCII bytes in the CSS
      # b"""...""" string, which silently breaks every GTK window.
      - name: Syntax-check all Python modules
        run: python -m compileall -q bin tests

      - name: Run tests
        run: pytest -q
