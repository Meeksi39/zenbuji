name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '✨ Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Fixes'
    labels: ['fix', 'bug']
  - title: '🎨 UI & polish'
    labels: ['ui']
  - title: '📚 Documentation'
    labels: ['documentation']
  - title: '🧹 Maintenance'
    labels: ['chore', 'maintenance']

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['fix', 'bug', 'ui', 'documentation', 'chore', 'maintenance']
  default: patch

# Label PRs automatically from their branch prefix
# (feat/  fix/  docs/  chore/). The `ui` label stays manual.
autolabeler:
  - label: 'feature'
    branch:
      - '/^feat\//'
  - label: 'fix'
    branch:
      - '/^fix\//'
  - label: 'documentation'
    branch:
      - '/^docs\//'
  - label: 'chore'
    branch:
      - '/^chore\//'

template: |
  ## What's changed

  $CHANGES

  ---

  ### Install

  **GNOME extension only** — download `zenbuji@meeksi39.shell-extension.zip` below, then:

  ```sh
  gnome-extensions install zenbuji@meeksi39.shell-extension.zip --force
  # Wayland: log out and back in to load it
  gnome-extensions enable zenbuji@meeksi39
  ```

  The extension is a thin front-end — full functionality (furigana, translation, OCR,
  practice, TTS) needs the Python backend. For everything, clone the repo and run
  `./install.sh` (see the [README](https://github.com/Meeksi39/zenbuji#quick-start)).
